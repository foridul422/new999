<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live TV Player</title>
  <meta name="theme-color" content="#0b1220" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1d2b4a, #080c14 65%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .card {
      width: 100%;
      max-width: 980px;
      background: rgba(10, 16, 28, 0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .top {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title { font-size: 20px; font-weight: 700; }
    .status {
      font-size: 13px;
      padding: 7px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
    }
    .video-wrap {
      background: #000;
      position: relative;
      aspect-ratio: 16 / 9;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }
    .controls {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button, select {
      border: 0;
      border-radius: 14px;
      padding: 13px 12px;
      background: #223455;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover, select:hover { background: #2d456f; }
    .wide { grid-column: span 2; }
    .note {
      padding: 0 16px 18px;
      color: #c8d3e8;
      line-height: 1.6;
      font-size: 14px;
    }
    .urlbox {
      margin: 0 16px 16px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      color: #dbe7ff;
      word-break: break-all;
      font-size: 13px;
    }
    @media (max-width: 650px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .wide { grid-column: span 2; }
      .title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <div class="title">📺 Live Screen Player</div>
      <div class="status" id="status">Loading...</div>
    </div>

    <div class="video-wrap">
      <video id="video" controls playsinline autoplay></video>
    </div>

    <div class="controls">
      <button onclick="playVideo()">▶ Play</button>
      <button onclick="pauseVideo()">⏸ Pause</button>
      <button onclick="unmute()">🔊 Sound On</button>
      <button onclick="mute()">🔇 Mute</button>
      <button class="wide" onclick="goFullscreen()">⛶ Fullscreen</button>
      <button class="wide" onclick="pictureInPicture()">🪟 Background / PiP</button>
      <select class="wide" id="qualitySelect" onchange="changeQuality()">
        <option value="-1">Auto Quality</option>
      </select>
      <button class="wide" onclick="reloadStream()">🔄 Reload Stream</button>
    </div>

    <div class="urlbox" id="streamUrl"></div>

    <div class="note">
      ✅ Sound ঠিক রাখতে video muted করা হয়নি।  
      ✅ Android/Chrome-এ Picture-in-Picture দিলে অন্য app ব্যবহার করলেও video ছোট window-তে চলবে।  
      ⚠️ Mobile browser autoplay আটকালে Play চাপতে হবে।  
      ⚠️ iPhone/Safari background play browser policy-এর উপর নির্ভর করে।
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const streamUrl = "http://182.48.93.238:8080/live/screen.m3u8";
    const video = document.getElementById("video");
    const statusEl = document.getElementById("status");
    const qualitySelect = document.getElementById("qualitySelect");
    let hls;

    document.getElementById("streamUrl").textContent = streamUrl;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setupPlayer() {
      setStatus("Connecting...");
      qualitySelect.innerHTML = '<option value="-1">Auto Quality</option>';

      if (hls) {
        hls.destroy();
        hls = null;
      }

      if (Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 60
        });

        hls.loadSource(streamUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          setStatus("Live Ready");
          loadQualities();
          video.play().catch(() => setStatus("Tap Play to start"));
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            setStatus("Stream Error - Reloading...");
            setTimeout(setupPlayer, 2000);
          }
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = streamUrl;
        video.addEventListener("loadedmetadata", function () {
          setStatus("Live Ready");
          video.play().catch(() => setStatus("Tap Play to start"));
        });
      } else {
        setStatus("Browser not supported");
        alert("এই browser HLS stream support করে না। Chrome/Edge/Safari ব্যবহার করুন।");
      }
    }

    function loadQualities() {
      if (!hls) return;
      hls.levels.forEach((level, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = `${level.height || "Auto"}p`;
        qualitySelect.appendChild(option);
      });
    }

    function changeQuality() {
      if (!hls) return;
      hls.currentLevel = Number(qualitySelect.value);
    }

    function playVideo() {
      video.play();
      setStatus("Playing");
    }

    function pauseVideo() {
      video.pause();
      setStatus("Paused");
    }

    function mute() {
      video.muted = true;
    }

    function unmute() {
      video.muted = false;
      video.volume = 1;
      video.play();
    }

    function goFullscreen() {
      if (video.requestFullscreen) video.requestFullscreen();
      else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    }

    async function pictureInPicture() {
      try {
        if (document.pictureInPictureElement) {
          await document.exitPictureInPicture();
        } else if (document.pictureInPictureEnabled) {
          await video.requestPictureInPicture();
        } else {
          alert("এই browser Picture-in-Picture support করে না।");
        }
      } catch (e) {
        alert("PiP চালু করা যায়নি। আগে Play চাপুন।");
      }
    }

    function reloadStream() {
      setupPlayer();
    }

    video.addEventListener("playing", () => setStatus("Playing Live"));
    video.addEventListener("waiting", () => setStatus("Buffering..."));
    video.addEventListener("pause", () => setStatus("Paused"));

    setupPlayer();
  </script>
</body>
</html>
